
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --c:#00e5ff;--cd:rgba(0,229,255,.5);--cf:rgba(0,229,255,.12);
  --bg:#030810;--bgc:#060e1d;--bgc2:#04090f;
  --tb:#d8f4ff;--tm:#80c8d8;--tmu:#3a6a7a;
  --ds:#5865F2;
}
body{background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 16px;font-family:'Share Tech Mono','Courier New',monospace;overflow-x:hidden}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;background:#fff;border-radius:50%;animation:tw var(--d) var(--dl) infinite ease-in-out}
@keyframes tw{0%,100%{opacity:.08}50%{opacity:.9}}
.wrap{position:relative;z-index:1;width:100%;max-width:800px;display:flex;flex-direction:column;gap:12px}

.card{background:var(--bgc);border:1.5px solid var(--cd);border-radius:12px;position:relative;padding:20px;box-shadow:0 0 20px rgba(0,229,255,.06),inset 0 0 40px rgba(0,229,255,.02)}
.card .tl,.card .tr,.card .bl,.card .br{content:'';position:absolute;width:13px;height:13px;border-color:var(--c);border-style:solid;filter:drop-shadow(0 0 3px var(--c))}
.card .tl{top:-1px;left:-1px;border-width:2.5px 0 0 2.5px;border-radius:4px 0 0 0}
.card .tr{top:-1px;right:-1px;border-width:2.5px 2.5px 0 0;border-radius:0 4px 0 0}
.card .bl{bottom:-1px;left:-1px;border-width:0 0 2.5px 2.5px;border-radius:0 0 0 4px}
.card .br{bottom:-1px;right:-1px;border-width:0 2.5px 2.5px 0;border-radius:0 0 4px 0}

.pgrid{display:grid;grid-template-columns:122px 1fr auto;align-items:stretch}
.pgrid>*+*{border-left:1px solid var(--cf)}
.col-av{padding-right:18px;display:flex;align-items:center;justify-content:center}
.av-frame{width:108px;height:114px;border:1.5px solid var(--cd);border-radius:8px;overflow:hidden;background:#0a1929;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.av-ph{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--c);opacity:.3;text-align:center;line-height:2.2;padding:8px}

.col-c{padding:0 18px;display:flex;flex-direction:column;justify-content:center;gap:10px}
.uname{font-family:'Press Start 2P',monospace;font-size:19px;color:var(--tb);text-shadow:0 0 10px rgba(0,229,255,.3);line-height:1.2;cursor:default}
.uname:hover{animation:glitch .4s steps(2) infinite}
@keyframes glitch{0%{text-shadow:2px 0 #ff003c,-2px 0 #00e5ff}50%{text-shadow:-2px 0 #ff003c,2px 0 #00e5ff}100%{text-shadow:2px 0 #ff003c,-2px 0 #00e5ff}}
.kao{font-size:12px;color:var(--c);opacity:.75}
.loc{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--tm)}
.pin{width:9px;height:12px;background:#ff3366;border-radius:50% 50% 50% 0;transform:rotate(-45deg);flex-shrink:0;box-shadow:0 0 5px #ff3366}
.dbadge{display:inline-flex;align-items:center;gap:8px;background:#0d1c38;border:1.2px solid var(--ds);border-radius:7px;padding:6px 12px;width:fit-content;cursor:pointer;text-decoration:none;transition:background .2s}
.dbadge:hover{background:#141f3f}
.dico{width:22px;height:22px;background:var(--ds);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dico svg{width:13px;height:13px}
.dlbl{color:#8098b0;font-size:11px}
.dpill{background:var(--ds);color:#fff;font-size:10px;padding:2px 8px;border-radius:4px}

.col-info{padding:10px 16px;background:var(--bgc2);border-radius:0 10px 10px 0;display:flex;flex-direction:column;justify-content:center;gap:7px;min-width:188px}
.iline{font-size:11px;color:var(--c);display:flex;align-items:center;gap:6px;text-shadow:0 0 6px rgba(0,229,255,.35)}
.iline::before{content:'>';color:rgba(0,229,255,.45);font-size:10px}
.dot-c{position:absolute;bottom:-8px;right:26px;width:14px;height:14px;background:var(--bgc);border:1.5px solid var(--c);border-radius:3px;box-shadow:0 0 5px var(--c)}

.sc-row{display:flex;gap:9px;flex-wrap:wrap}
.sc{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:8px;font-size:11px;font-weight:bold;letter-spacing:1px;text-decoration:none;cursor:pointer;transition:transform .15s,filter .15s;border:none;font-family:'Share Tech Mono',monospace}
.sc:hover{transform:translateY(-2px);filter:brightness(1.2)}
.sc svg{width:15px;height:15px;flex-shrink:0}
.sc-tg{background:#1a7bbf;color:#fff}
.sc-tt{background:#111;color:#fff;border:1px solid #333}
.sc-gh{background:#1a1f27;color:#c9d1d9;border:1px solid #333}
.sc-st{background:#1a2535;color:#c9d8e3;border:1px solid #2a3a4a}
.sc-lf{background:#c0281b;color:#fff}

.pl-in{display:flex;flex-direction:column;gap:12px}
.pl-main{display:flex;align-items:center;gap:14px}
.album{width:62px;height:62px;border:1.5px solid var(--cd);border-radius:7px;background:linear-gradient(135deg,#0b2518,#081a2a);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;color:var(--c);opacity:.4;overflow:hidden}
.album img{width:100%;height:100%;object-fit:cover;opacity:1}
.tinfo{flex:1;min-width:0}
.tname{font-size:14px;color:var(--tb);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tsub{font-size:10px;color:var(--tmu);margin-top:4px;letter-spacing:1px}
.ttime{font-size:10px;color:var(--tmu);margin-top:3px;letter-spacing:3px}
.ctrls{display:flex;gap:8px;align-items:center}
.btn{width:38px;height:38px;background:#0a1829;border:1.2px solid var(--cd);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s;flex-shrink:0}
.btn:hover{background:#0e2038;border-color:var(--c)}
.btn svg{width:15px;height:15px}
.btn.play{background:#0c1f38;border-color:var(--c);box-shadow:0 0 8px rgba(0,229,255,.2)}
.pbar-wrap{height:4px;background:#0c1e30;border-radius:2px;overflow:hidden;cursor:pointer;position:relative}
.pbar{height:100%;width:0%;background:var(--c);border-radius:2px;box-shadow:0 0 5px rgba(0,229,255,.6);transition:width .1s linear}
.pl-foot{display:flex;justify-content:center;align-items:center}
.views{font-size:10px;color:var(--tmu);display:flex;align-items:center;gap:5px}
</style>

<script>
const sc=document.getElementById('stars');
for(let i=0;i<65;i++){const s=document.createElement('div');s.className='star';const z=Math.random()*2+1;s.style.cssText=`width:${z}px;height:${z}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*5+2).toFixed(1)}s;--dl:${(Math.random()*6).toFixed(1)}s`;sc.appendChild(s)}
const TR=[{n:'5loe – fears',s:'Track 1 / 3',d:'1:32',m:92},{n:'rextention – vibes',s:'Track 2 / 3',d:'2:14',m:134},{n:'lofi – night drive',s:'Track 3 / 3',d:'3:05',m:185}];
let c=0,pl=false,el=0,tm=null;
function rd(){const t=TR[c];document.getElementById('tn').textContent=t.n;document.getElementById('ts').textContent=t.s;document.getElementById('tt').textContent=`0:00   ${t.d}`;document.getElementById('pb2').style.width='0%';el=0}
function togPlay(){pl=!pl;const i=document.getElementById('pi');if(pl){i.innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';tm=setInterval(tick,1000)}else{i.innerHTML='<path d="M8 5v14l11-7z"/>';clearInterval(tm)}}
function tick(){const t=TR[c];el++;if(el>=t.m){nextT();return}const p=(el/t.m)*100;document.getElementById('pb2').style.width=p+'%';const mm=Math.floor(el/60),ss=el%60;document.getElementById('tt').textContent=`${mm}:${ss<10?'0'+ss:ss}   ${t.d}`}
function prevT(){clearInterval(tm);pl=false;document.getElementById('pi').innerHTML='<path d="M8 5v14l11-7z"/>';c=(c-1+TR.length)%TR.length;rd()}
function nextT(){clearInterval(tm);pl=false;document.getElementById('pi').innerHTML='<path d="M8 5v14l11-7z"/>';c=(c+1)%TR.length;rd()}
document.getElementById('pw').addEventListener('click',function(e){const p=e.offsetX/this.offsetWidth;const t=TR[c];el=Math.floor(p*t.m);const mm=Math.floor(el/60),ss=el%60;document.getElementById('pb2').style.width=(p*100)+'%';document.getElementById('tt').textContent=`${mm}:${ss<10?'0'+ss:ss}   ${t.d}`});
rd();
</script>
